<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
    <script src="script.js" defer></script>
    <title>payment processing</title>
</head>
<body>

    <div class="container-fluid border pb-0 px-2">
        <form id="paymentForm">
            
            <div class="form-row bg-light border m-0">
                <div class="col-12 m-0">
                    <h1 class="text-center">PAY-U</h1> 
                </div>
            </div>

            <div class="form-row mt-3">
                <div class="form-group col-4 mb-3">
                    <label for="cc-number">Card</label>
                    <input type="text" class="form-control" id="cc-number" required placeholder="1234 5678 9012 3456">
                    <div class="invalid-tooltip">
                        Card number is required
                    </div>
                </div>    
                
                <div class="form-group col-4">
                    <label for="CVC-number">CVC</label>
                    <input type="text" class="form-control" id="CVC-number" required placeholder="000">
                    <div class="invalid-feedback">
                        Credit card number is required
                    </div>
                </div>

                <div class="form-group col-4">
                    <label for="amount-number">Amount</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <div class="input-group-text">$</div>
                        </div>
                        <input type="text" class="form-control" id="amount-number" required placeholder="Amount">
                        <div class="invalid-feedback">
                            Amount is required
                        </div>
                    </div> 
                </div>
            </div>

            <div class="row">
                <div class="form-group col-6">
                    <label for="firstName">First Name</label>
                    <input type="text" class="form-control" id="firstName" placeholder="" required>
                    <small class="text-muted">Full name as displayed on card</small>
                    <div class="invalid-feedback">
                        Name on card is required
                    </div>
                </div>
                
                <div class="form-group col-6">
                    <label for="lastName">Last Name</label>
                    <input type="text" class="form-control" id="lastName" placeholder="" required>
                    <div class="invalid-feedback">
                        Last Name on card is required
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn btn-primary mb-3">Submit</button>
            
        </form>
    </div>

</body>
</html>
