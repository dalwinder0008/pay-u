<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay-U Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-header">
            <h2>PAY-U SECURE CHECKOUT</h2>
        </div>
        <form id="paymentForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input 
                        type="text" 
                        id="firstName" 
                        placeholder="John" 
                        required
                        oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '');" >
                </div>
                
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input 
                        type="text" 
                        id="lastName" 
                        placeholder="Doe" 
                        required
                        oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '');"
                    >
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="user@gmail.com" required>
            </div>
            <div class="form-group">
                <label for="phone">Contact Number</label>
                <input 
                    type="tel" 
                    id="phone" 
                    placeholder="9876543210" 
                    maxlength="10" 
                    required
                    oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                >
            </div>
            <div class="form-group">
                <label for="address">Billing Address</label>
                <input type="text" id="address" placeholder="H.No / Street / Locality" required>
            </div>

            <div class="form-group">
                <label for="amount">Amount (USD $)</label>
                <input 
                    type="number" 
                    id="amount" 
                    placeholder="0.00" 
                    step="0.01" 
                    min="0.01" 
                    required
                >
            </div>
            <button type="submit" class="submit-btn">Proceed to Pay</button>

        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
